url: https://luansheng.github.io/visPedigree/
template:
  bootstrap: 5
  bootswatch: litera
figures:
  dev: png
  dpi: 300
  fig.width: 6
  fig.height: 6
reference:
- title: Core Functions
  desc: Main tools for processing and visualizing animal pedigrees.
  contents:
  - tidyped
  - visped
  - splitped
- title: Relationship Matrices
  desc: Tools for computing and analyzing genetic relationship matrices.
  contents:
  - pedmat
  - expand_pedmat
  - query_relationship
  - vismat
- title: Pedigree Analysis
  desc: Functions for genealogical and genetic computations.
  contents:
  - inbreed
- title: Datasets
  desc: Built-in pedigree examples for testing and demonstration.
  contents: ends_with("_ped")
- title: S3 Methods
  desc: Generic methods for 'tidyped' and 'pedmat' objects.
  contents:
  - starts_with("plot.")
  - starts_with("summary.")
  - starts_with("print.")
  - summary_pedmat

